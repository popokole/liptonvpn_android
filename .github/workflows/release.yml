name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          cache-read-only: false

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > lipton_android_app/lipton.jks

      - name: Build & Sign Release APK
        working-directory: lipton_android_app
        run: gradle assembleRelease --no-daemon
        env:
          KEYSTORE_PATH:          lipton.jks
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LiptonVPN v${{ steps.version.outputs.version }}
          files: lipton_android_app/app/build/outputs/apk/release/*.apk
          generate_release_notes: false
          body: |
            ## LiptonVPN v${{ steps.version.outputs.version }}

            📱 Скачайте APK ниже и установите на телефон.

            > Если Android предупреждает об установке из неизвестных источников — разрешите для этого файла.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
